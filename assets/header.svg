<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3fb950;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#58a6ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f0883e;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" rx="12" fill="url(#bg)"/>

  <!-- ========== LEFT DOCUMENT (OLD) ========== -->
  <g transform="translate(100, 38)">
    <!-- Document body -->
    <rect x="0" y="0" width="160" height="204" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
    <!-- Fold corner -->
    <path d="M120,0 L160,40 L120,40 Z" fill="#30363d"/>
    <!-- Section 1: Header -->
    <rect x="16" y="18" width="90" height="11" rx="2" fill="#8b949e" opacity="0.7"/>
    <!-- Content lines -->
    <rect x="16" y="46" width="128" height="6" rx="2" fill="#484f58" opacity="0.5"/>
    <rect x="16" y="60" width="110" height="6" rx="2" fill="#484f58" opacity="0.5"/>
    <rect x="16" y="74" width="120" height="6" rx="2" fill="#484f58" opacity="0.5"/>
    <!-- Section divider -->
    <line x1="16" y1="92" x2="144" y2="92" stroke="#30363d" stroke-width="1"/>
    <!-- Section 2: Header -->
    <rect x="16" y="104" width="74" height="11" rx="2" fill="#8b949e" opacity="0.7"/>
    <!-- Content lines -->
    <rect x="16" y="128" width="120" height="6" rx="2" fill="#484f58" opacity="0.5"/>
    <rect x="16" y="142" width="100" height="6" rx="2" fill="#484f58" opacity="0.5"/>
    <rect x="16" y="156" width="115" height="6" rx="2" fill="#484f58" opacity="0.5"/>
    <rect x="16" y="170" width="85" height="6" rx="2" fill="#484f58" opacity="0.5"/>
    <!-- OLD badge -->
    <rect x="50" y="216" width="60" height="20" rx="4" fill="#30363d" stroke="#484f58" stroke-width="1"/>
    <text x="80" y="230" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#8b949e" letter-spacing="1.5">OLD</text>
  </g>

  <!-- ========== DIFF ARROW ========== -->
  <g transform="translate(290, 110)" filter="url(#glow)">
    <!-- Arrow shaft -->
    <line x1="0" y1="28" x2="70" y2="28" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Arrow head -->
    <polygon points="70,20 88,28 70,36" fill="#58a6ff"/>
    <!-- "diff" label -->
    <text x="35" y="16" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#58a6ff" letter-spacing="0.5">diff</text>
  </g>

  <!-- ========== RIGHT DOCUMENT (NEW) ========== -->
  <g transform="translate(420, 38)">
    <!-- Document body -->
    <rect x="0" y="0" width="160" height="204" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
    <!-- Fold corner -->
    <path d="M120,0 L160,40 L120,40 Z" fill="#30363d"/>
    <!-- Section 1: Header -->
    <rect x="16" y="18" width="90" height="11" rx="2" fill="#8b949e" opacity="0.7"/>
    <!-- Content lines with MODIFIED highlight -->
    <rect x="12" y="42" width="136" height="16" rx="3" fill="#d29922" opacity="0.18"/>
    <rect x="16" y="46" width="128" height="6" rx="2" fill="#d29922" opacity="0.8"/>
    <rect x="16" y="60" width="110" height="6" rx="2" fill="#484f58" opacity="0.5"/>
    <rect x="16" y="74" width="120" height="6" rx="2" fill="#484f58" opacity="0.5"/>
    <!-- Section divider -->
    <line x1="16" y1="92" x2="144" y2="92" stroke="#30363d" stroke-width="1"/>
    <!-- Section 2: Header -->
    <rect x="16" y="104" width="74" height="11" rx="2" fill="#8b949e" opacity="0.7"/>
    <!-- Content lines unchanged -->
    <rect x="16" y="128" width="120" height="6" rx="2" fill="#484f58" opacity="0.5"/>
    <rect x="16" y="142" width="100" height="6" rx="2" fill="#484f58" opacity="0.5"/>
    <rect x="16" y="156" width="115" height="6" rx="2" fill="#484f58" opacity="0.5"/>
    <rect x="16" y="170" width="85" height="6" rx="2" fill="#484f58" opacity="0.5"/>
    <!-- Section 3: ADDED highlight -->
    <line x1="16" y1="188" x2="144" y2="188" stroke="#3fb950" stroke-width="1" opacity="0.5"/>
    <rect x="12" y="192" width="136" height="10" rx="3" fill="#3fb950" opacity="0.18"/>
    <rect x="16" y="194" width="90" height="5" rx="2" fill="#3fb950" opacity="0.8"/>
    <!-- NEW badge -->
    <rect x="370" y="216" width="60" height="20" rx="4" fill="#30363d" stroke="#484f58" stroke-width="1"/>
    <text x="400" y="230" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#8b949e" letter-spacing="1.5">NEW</text>
  </g>

  <!-- ========== CHANGE INDICATORS ========== -->
  <!-- Modified (~) indicator - circle on left edge of right doc -->
  <circle cx="410" cy="60" r="7" fill="#d29922"/>
  <text x="410" y="64" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#0d1117">~</text>

  <!-- Added (+) indicator - circle on left edge of right doc -->
  <circle cx="410" cy="200" r="7" fill="#3fb950"/>
  <text x="410" y="204" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#0d1117">+</text>

  <!-- ========== SECTION BRACKETS ========== -->
  <g transform="translate(600, 38)">
    <!-- Section 1 bracket (modified) -->
    <path d="M0,8 Q-8,8 -8,16 L-8,86 Q-8,94 0,94" fill="none" stroke="#d29922" stroke-width="1.8" opacity="0.7"/>
    <text x="10" y="52" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#d29922" opacity="0.9">sec 1</text>
    <text x="10" y="66" font-family="system-ui, sans-serif" font-size="9" fill="#d29922" opacity="0.65">modified</text>

    <!-- Section 2 bracket (unchanged) -->
    <path d="M0,94 Q-8,94 -8,102 L-8,178 Q-8,186 0,186" fill="none" stroke="#8b949e" stroke-width="1.5" opacity="0.45"/>
    <text x="10" y="142" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#8b949e" opacity="0.6">sec 2</text>
    <text x="10" y="156" font-family="system-ui, sans-serif" font-size="9" fill="#8b949e" opacity="0.45">unchanged</text>

    <!-- Section 3 bracket (added) -->
    <path d="M0,190 Q-8,190 -8,198 L-8,220 Q-8,228 0,228" fill="none" stroke="#3fb950" stroke-width="1.8" opacity="0.7"/>
    <text x="10" y="210" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#3fb950" opacity="0.9">sec 3</text>
    <text x="10" y="224" font-family="system-ui, sans-serif" font-size="9" fill="#3fb950" opacity="0.65">added</text>
  </g>

  <!-- ========== BOTTOM TITLE ========== -->
  <text x="450" y="268" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#8b949e" letter-spacing="0.8">Markdown Section-Level Semantic Diff</text>
</svg>
